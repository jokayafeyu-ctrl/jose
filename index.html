<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Institucional</title>
    <link rel="stylesheet" href="style.css">
</head>



<body>

    <header>
        <h1>Centro Educativo Nueva Esperanza</h1>
        <p>Formulario Institucional de Estudiantes</p>
    </header>

    <div class="contenedor">

        <h2>Registro de Solicitud</h2>

<body>
    <ul class="container">
       <li>
            <img src="5.png" alt="Estudiante">
            <div class="content">
               <fieldset>
                <legend>1. Datos del Estudiante</legend>

                <div class="fila">
                    <div class="grupo">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre"
                            placeholder="Digite el nombre completo" required>
                    </div>

                    <div class="grupo">
                        <label for="identificacion">Identificación</label>
                        <input type="text" id="identificacion" name="identificacion"
                            placeholder="Ejemplo: 1-1234-5678" required>
                    </div>
                </div>

                <div class="fila">
                    <div class="grupo">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" name="edad"
                            min="5" max="80" placeholder="Digite la edad" required>
                    </div>
                     <div class="grupo">
                        <label for="edad">Fecha de Nacimiento</label>
                        <input type="number" id="edad" name="edad"
                            min="5" max="80" placeholder="Digite la edad" required>
                    </div>

                    <div class="grupo">
                        <label for="nivel">Nacionalidad</label>
                        <select id="nivel" name="nivel" required>
                            <option value="">Seleccione una opción</option>
                            <option value="Costarricense">Costarricense</option>
                            <option value="Nicaragüense">Nicaragüense</option>
                            <option value="Panameño">Panameño</option>
                            <option value="Colombiano">Colombiano</option>
                            <option value="Argentino">Argentino</option>
                            <option value="ninguna de las anteriores">ninguna de las anteriores</option>
                        </select>
                    </div>


                  
                </div>
            </fieldset>

            </div>
        </li>
         <li>
            <img src="2.jpg" alt="estudiante ">
            <div class="content">
               <div class="fila">
                   <fieldset>
                <legend>1. Datos del Estudiante</legend>

                <div class="fila">
                    <div class="grupo">
                        <label for="nombre">direccion exacta </label>
                        <input type="text" id="nombre" name="nombre"
                            placeholder="Digite la direccion correcta completo" required>
                    </div>

                    <div class="grupo">
                        <label for="identificacion">telefono</label>
                        <input type="text" id="identificacion" name="identificacion"
                            placeholder="Ejemplo: 1-1234-5678" required>
                    </div>
                    <div class="grupo">
                        <label for="identificacion">Correo Electrónico</label>
                        <input type="text" id="identificacion" name="identificacion"
                            placeholder="Ejemplo:1234567@gmail.com" required>
                    </div>

                    <div>
                        <div class="grupo">
                        <label for="identificacion">Correo Electrónico</label>
                        <input type="text" id="identificacion" name="identificacion"
                            placeholder="Ejemplo:1234567@gmail.com" required>
                    </div>
                        <div>
                        <div class="grupo">
                        <label for="nivel">Genero</label>
                        <select id="nivel" name="nivel" required>
                            <option value="">Seleccione una opción</option>
                            <option value="Costarricense">Masculino</option>
                            <option value="Nicaragüense">Femenino</option>
                            <option value="Costarricense">no se -_-</option>
                        </select>
                    </div>
                        </div>
                    </div>
                </div>
                   </fieldset>
                </div>
            </div>
        </li>




        <li>
            <img src="3.jpg" alt="encargado">
            <div class="content">
               <fieldset>
                <legend>2. Datos del Encargado</legend>

                <div class="fila">

                    <div class="grupo">
                        <label for="encargado">Nombre del Encargado</label>
                        <input type="text" id="encargado" name="encargado"
                            placeholder="Nombre completo" required>
                    </div>
                     <div class="grupo">
                        <label for="encargado">Edad del Encargado</label>
                        <input type="text" id="encargado" name="encargado"
                            placeholder="edad" required>
                    </div>
                    <div class="grupo">
                        <label for="jornada">Grado escolario</label>
                        <select id="jornada" name="grado">
                            <option value="">Seleccione una opción</option>
                            <option value="mañana">Colegio incompleto</option>
                            <option value="tarde">Bachillerato en Educación Media</option>
                            <option value="noche">Técnico en Educación Media</option>
                            <option value="noche">Bachillerato en Universidad</option>
                            <option value="noche">Licenciatura</option>

                        </select>
                    </div>

                    <div class="grupo">
                        <label for="parentesco">Parentesco</label>
                        <select id="parentesco" name="parentesco" required>
                            <option value="">Seleccione una opción</option>
                            <option value="Madre">Madre</option>
                            <option value="Padre">Padre</option>
                            <option value="Tia/Tio">Tía/Tío</option>
                            <option value="Encargado Legal">Encargado Legal</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                      <div class="grupo">
                        <label for="nivel">Nacionalidad</label>
                        <select id="nivel" name="nivel" required>
                            <option value="">Seleccione una opción</option>
                            <option value="Costarricense">Costarricense</option>
                            <option value="Nicaragüense">Nicaragüense</option>
                            <option value="Panameño">Panameño</option>
                            <option value="Colombiano">Colombiano</option>
                            <option value="Argentino">Argentino</option>
                            <option value="ninguna de las anteriores">ninguna de las anteriores</option>
                        </select>
                    </div>
                  

                </div>

                <div class="fila">
                    <div class="grupo">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono"
                            placeholder="Ejemplo: 8888-8888" required>
                    </div>

                    <div class="grupo">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" name="correo"
                            placeholder="ejemplo@correo.com" required>
                    </div>
                </div>
            </fieldset>
            </div>
        </li>

        <li>
            <img src="4.jpg" alt="instituto">
            <div class="content">
               <fieldset>
                  <legend>4. Datos del Estudiante</legend>
                <div class="fila">
                     <div class="grupo">
                        <label for="telefono">Centro educativo </label>
                        <input type="tel" id="telefono" name="telefono"
                            placeholder="Centro Educativo" required>
                    </div>
                     <div class="grupo">
                        <label for="telefono">indique cual centro educativo</label>
                        <input type="tel" id="telefono" name="indique cual centro educativo"
                    
                     <label for="nivel">Has Repetido algún grado:</label>
                        <select id="nivel" name="nivel" required>
                            <option value="">Seleccione una opción</option>
                            <option value="si">si</option>
                            <option value="no">no</option>
                        </select>
                    </div>
                </div>
               </fieldset>
            </div>
        </li>















           
   <li>
            <img src="5.png" alt="Detalle de Solicitud">
            <div class="content">
                <span>
                <fieldset>
                <legend>5. Detalle de Solicitud</legend>

                <div class="grupo">
                    <label for="tipoSolicitud">Tipo de Solicitud</label>

                
                    <div class="grupo">
                        <label for="nivel">Plan de Estudio</label>
                        <select id="nivel" name="nivel" required>
                            <option value="1. I nivel (Primaria)">1. I nivel (Primaria)</option>
                            <option value="2. II nivel (séptimo, octavo y noveno)">2. II nivel (séptimo, octavo y noveno)</option>
                            <option value="3. III nivel (decimo, undécimo)">3. III nivel (decimo, undécimo)</option>
                           
                        </select>
                    </div>
                    <div class="grupo">
                        <label for="nivel">Especialidad Técnica</label>
                        <select id="nivel" name="nivel" required>
                            <option value="1. Desarrollo Web">1. Desarrollo Web</option>
                             <option value="2. Saludo Ocupacional">2. Saludo Ocupacional</option>
                              <option value="3. Secretariado Ejecutivo">3. Secretariado Ejecutivo</option>
                               <option value="4. Administración, Logística y distribución">4. Administración, Logística y distribución</option>
                            <option value="5. Contabilidad y finanzas">5. Contabilidad y finanzas </option>
                            <option value="6. Ejecutivo Comercial y servicio al cliente.">6. Ejecutivo Comercial y servicio al cliente.</option>
                        </select>
                    </div>
                    <div class="grupo">
                        <label for="nivel">Nacionalidad</label>
                        <select id="nivel" name="nivel" required>
                            <option value="">Seleccione una opción</option>
                            <option value="1. Taller de música">1. Taller de música</option>
                            <option value="2. Corte y confección.">2. Corte y confección.</option>
                            <option value="3. Computación">3. Computación</option>
                            <option value="4. Preparación de Bebidas.">4. Preparación de Bebidas.</option>
                            <option value="5. Montajes eléctricos.">5. Montajes eléctricos.</option>
                            <option value="6. Elaboración de confites.">6. Elaboración de confites.</option>
                            <option value="7. Taller de pintura.">7. Taller de pintura.</option>
                            <option value="8. Alta costura.">8. Alta costura.</option>
                            <option value="9. Ingles conversacional.">9. Ingles conversacional.</option>
                            <option value="10. Confección de accesorios.">10. Confección de accesorios.</option>

                           
                        </select>
                    </div>
                  
                </div>
            </fieldset>
                </span>
            </div>
        </li>


















   <li>
            <img src="1.jpg" alt="Detalle de Solicitud">
            <div class="content">
                <span>
                <fieldset>
                <legend>6. Detalle de Solicitud</legend>

                <div class="grupo">
                    <label for="tipoSolicitud">Tipo de Solicitud</label>

                    <select id="tipoSolicitud" name="tipoSolicitud">
                        <option value="Matricula">Matrícula</option>
                        <option value="Constancia">Solicitud de Constancia</option>
                        <option value="JustificacionAusencia">Justificación de Ausencia</option>
                        <option value="ApoyoEducativo">Solicitud de Apoyo Educativo</option>
                        <option value="ConsultaNotas">Consultar Notas</option>
                        <option value="ReunionDocente">Reunión con el Docente</option>
                        <option value="ReunionOrientacion">Reunión con Orientación</option>
                    </select>
                </div>

                <div class="grupo">
                    <label for="urgencia">Nivel de Urgencia</label>

                    <select id="urgencia" name="urgencia">
                        <option value="">Seleccione una opción</option>
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>

                <div class="grupo">
                    <label for="detalle">Detalle de la Solicitud</label>

                    <textarea id="detalle" name="detalle"
                        placeholder="Explique brevemente la solicitud"></textarea>
                </div>

                <div class="grupo">
                    <label for="archivo">Adjuntar Documento</label>
                    <input type="file" id="archivo" name="archivo">
                </div>

                <div class="grupo">
                    <label>
                        <input type="checkbox" id="autorizacion" class="check" required>
                        Autorizo el uso de esta información para fines educativos y administrativos.
                    </label>
                </div>

                <div class="grupo">
                    <label>
                        <input type="checkbox" id="veracidad" class="check" required>
                        Declaro que la información brindada es verdadera.
                    </label>
                </div>

                <div class="grupo">
                    <button type="submit">Enviar Solicitud</button>
                    <button type="reset">Limpiar Formulario</button>
                </div>

            </fieldset>

                </span>
            </div>
        </li>






         
    </ul>
      <script src="index.js"></script>
</div>
</body>
</html>
